}

  font-weight: bold;
  text-decoration: none;
  font-size: 0.85rem;
}
.livecard-links a.disabled {
  background: #555;
  pointer-events: none;
}

.livecard-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--livecard-border);
  border-radius: 8px;
  padding: 0.4rem 0.75rem;
  font-size: 0.8rem;
  color: var(--livecard-muted);
  flex-wrap: wrap;
  gap: 0.3rem;
}
